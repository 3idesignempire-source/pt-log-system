<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym PT Log Sheet</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            background: #ffffff;
            margin: auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1a252f;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }
        input, select, textarea {
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
        /* Special highlight for Body Parts field */
        .body-part-group {
            background-color: #eef7fc;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #3498db;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #dddddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
            font-size: 14px;
        }
        .btn-container {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-save {
            background-color: #27ae60;
            color: white;
        }
        .btn-print {
            background-color: #2980b9;
            color: white;
        }
        .btn-reset {
            background-color: #e74c3c;
            color: white;
        }
        .btn:hover {
            opacity: 0.9;
        }
        @media print {
            .btn-container {
                display: none;
            }
            body {
                background-color: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏋️‍♂️ Personal Training Log Sheet</h2>
    
    <div class="form-grid">
        <div class="form-group">
            <label for="date">தேதி (Date):</label>
            <input type="date" id="date">
        </div>
        <div class="form-group">
            <label for="clientName">கிளைண்ட் பெயர் (Client Name):</label>
            <input type="text" id="clientName" placeholder="பெயர் உள்ளிடவும்">
        </div>
        <div class="form-group">
            <label for="trainerName">டிரெய்னர் பெயர் (Trainer Name):</label>
            <input type="text" id="trainerName" placeholder="டிரெய்னர் பெயர்">
        </div>
        
        <div class="form-group body-part-group">
            <label for="bodyPart">🎯 உடற்பயிற்சி பகுதி (Body Part):</label>
            <select id="bodyPart">
                <option value="">-- செலக்ட் செய்யவும் --</option>
                <option value="Chest">Chest (நெஞ்சுப் பகுதி)</option>
                <option value="Back">Back (முதுகுப் பகுதி)</option>
                <option value="Legs">Legs (கால்கள்)</option>
                <option value="Shoulders">Shoulders (தோள்பட்டை)</option>
                <option value="Biceps">Biceps (பைகேப்ஸ்)</option>
                <option value="Triceps">Triceps (ட்ரைசெப்ஸ்)</option>
                <option value="Abs/Core">Abs / Core (வயிறு & கோர்)</option>
                <option value="Cardio">Cardio (கார்டியோ)</option>
                <option value="Full Body">Full Body (முழு உடல்)</option>
            </select>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>S.No</th>
                <th>எக்சர்சைஸ் பெயர் (Exercise)</th>
                <th>செட்ஸ் (Sets)</th>
                <th>ரெப்ஸ் (Reps)</th>
                <th>வெயிட் (Weight - kg)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td><input type="text" style="width: 95%;"></td>
                <td><input type="number" style="width: 80%;"></td>
                <td><input type="number" style="width: 80%;"></td>
                <td><input type="text" style="width: 80%;"></td>
            </tr>
            <tr>
                <td>2</td>
                <td><input type="text" style="width: 95%;"></td>
                <td><input type="number" style="width: 80%;"></td>
                <td><input type="number" style="width: 80%;"></td>
                <td><input type="text" style="width: 80%;"></td>
            </tr>
            <tr>
                <td>3</td>
                <td><input type="text" style="width: 95%;"></td>
                <td><input type="number" style="width: 80%;"></td>
                <td><input type="number" style="width: 80%;"></td>
                <td><input type="text" style="width: 80%;"></td>
            </tr>
            <tr>
                <td>4</td>
                <td><input type="text" style="width: 95%;"></td>
                <td><input type="number" style="width: 80%;"></td>
                <td><input type="number" style="width: 80%;"></td>
                <td><input type="text" style="width: 80%;"></td>
            </tr>
            <tr>
                <td>5</td>
                <td><input type="text" style="width: 95%;"></td>
                <td><input type="number" style="width: 80%;"></td>
                <td><input type="number" style="width: 80%;"></td>
                <td><input type="text" style="width: 80%;"></td>
            </tr>
        </tbody>
    </table>

    <div class="form-group" style="margin-bottom: 20px;">
        <label for="notes">குறிப்புகள் / Reminders (Notes):</label>
        <textarea id="notes" rows="3" placeholder="இன்றைய ஒர்க்அவுட் பற்றிய குறிப்புகள்..."></textarea>
    </div>

    <div class="btn-container">
        <button class="btn btn-reset" onclick="location.reload()">Reset</button>
        <button class="btn btn-print" onclick="window.print()">Print Log</button>
        <button class="btn btn-save" onclick="alert('PT Log Saved Successfully!')">Save Log</button>
    </div>
</div>

</body>
</html>

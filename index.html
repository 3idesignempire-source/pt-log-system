        .app-screen { display: none; }

        /* Fixed Header Layout */
        .dashboard-header {

            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 20px;
        }
        .header-title-section { flex: 1; padding-right: 8px; }
        .header-btn-group { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
        .btn-header-action { font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 8px; white-space: nowrap; }

        /* Mouse Click Fix Button Layout */
        .btn-stacked-action {

            display: flex;
            flex-direction: column;

            padding: 20px 16px;

            font-size: 16px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.07);
            border: none;
            color: white;
            text-align: center;
            cursor: pointer;
        }
        .btn-stacked-action:hover { opacity: 0.95; }

        /* 3D Glass Box Icons */
        .icon-3d-box {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(10px);

            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;

            width: 56px;
            height: 56px;
            flex-shrink: 0;
            pointer-events: none;
        }

        .icon-3d-text {
            font-size: 30px;
            filter: drop-shadow(0px 5px 8px rgba(0,0,0,0.35)) drop-shadow(0px 1px 2px rgba(0,0,0,0.25)) saturate(1.4); 
            pointer-events: none;
        }

        .btn-label-centered { letter-spacing: 0.3px; text-shadow: 0 1px 2px rgba(0,0,0,0.15); pointer-events: none; }

<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym PT Log System</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 15px; }
    .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2, h3 { color: #2c3e50; text-align: center; }
    label { font-weight: bold; display: block; margin-top: 10px; }
    input, select, textarea, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
    button { background: #27ae60; color: white; font-weight: bold; border: none; margin-top: 15px; cursor: pointer; }
    button:hover { background: #219150; }
    .status-card { background: #eef9f1; border-left: 5px solid #27ae60; padding: 10px; margin-top: 10px; border-radius: 4px; }
  </style>
</head>
<body>

<div class="container">
  <h2>🏋️‍♂️ PT Workout Log Entry</h2>
  
  <form id="logForm">
    <label>Client Name (கிளைண்ட் பெயர்):</label>
    <input type="text" placeholder="உம்: கார்த்திக்" required>

    <label>Trainer Name (ட்ரைனர் பெயர்):</label>
    <input type="text" placeholder="உம்: வினோத்" required>

    <label>Workout Details (ஒர்க்அவுட் விபரம்):</label>
    <textarea rows="3" placeholder="உம்: Chest & Triceps - 4 Sets" required></textarea>

    <button type="button" onclick="addStatus()">Submit & Update Status</button>
  </form>

  <hr style="margin-top:25px;">

  <h3>📊 Live Workout Status</h3>
  <div id="statusList">
    <div class="status-card">
      <strong>கிளைண்ட்:</strong> சுரேஷ் | <strong>ட்ரைனர்:</strong> ரமேஷ்<br>
      <strong>ஒர்க்அவுட்:</strong> Leg Day + Cardio<br>
      <small style="color:gray;">Status: Completed Today at 10:30 AM</small>
    </div>
  </div>
</div>

<script>
  function addStatus() {
    alert("லாக் வெற்றிகரமாக அப்டேட் செய்யப்பட்டது ஜி!");
  }
</script>

</body>
</html>
